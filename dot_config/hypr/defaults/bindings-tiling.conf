# Close windows
bindd = SUPER, W, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, hyprctl clients -j | jq -r '.[].address' | xargs -I{} hyprctl dispatch closewindow address:{}

# Control tiling
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, P, Pseudo window, pseudo,
bindd = SUPER, T, Toggle floating/tiling, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# Move focus
bindd = SUPER, LEFT, Move focus left, movefocus, l
bindd = SUPER, RIGHT, Move focus right, movefocus, r
bindd = SUPER, UP, Move focus up, movefocus, u
bindd = SUPER, DOWN, Move focus down, movefocus, d

# Switch workspaces
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move window to workspace
bindd = SUPER SHIFT, code:10, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move to workspace 10, movetoworkspace, 10

# Silent move
bindd = SUPER SHIFT ALT, code:10, Silent move to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, code:11, Silent move to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, code:12, Silent move to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, code:13, Silent move to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, code:14, Silent move to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT ALT, code:15, Silent move to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT ALT, code:16, Silent move to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT ALT, code:17, Silent move to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT ALT, code:18, Silent move to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT ALT, code:19, Silent move to workspace 10, movetoworkspacesilent, 10

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB cycle
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move workspace to monitor
bindd = SUPER SHIFT ALT, LEFT, Workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Workspace to right monitor, movecurrentworkspacetomonitor, r

# Swap windows
bindd = SUPER SHIFT, LEFT, Swap left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap down, swapwindow, d

# Alt-tab
bindd = ALT, TAB, Next window, cyclenext
bindd = ALT SHIFT, TAB, Prev window, cyclenext, prev
bindd = ALT, TAB, Bring to top, bringactivetotop
bindd = ALT SHIFT, TAB, Bring to top, bringactivetotop

# Resize
bindd = SUPER, code:20, Expand left, resizeactive, -100 0
bindd = SUPER, code:21, Shrink left, resizeactive, 100 0
bindd = SUPER SHIFT, code:20, Shrink up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand down, resizeactive, 0 100

# Mouse
bindd = SUPER, mouse_down, Scroll workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll workspace backward, workspace, e-1
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Groups
bindd = SUPER, G, Toggle group, togglegroup
bindd = SUPER ALT, G, Move out of group, moveoutofgroup
bindd = SUPER ALT, LEFT, Join group left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Join group right, moveintogroup, r
bindd = SUPER ALT, TAB, Next in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Prev in group, changegroupactive, b
