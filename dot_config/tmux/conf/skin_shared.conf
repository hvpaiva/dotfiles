#################################### PLUGINS ###################################

mode_separator="ŅéĖ"
set -g @mode_indicator_empty_prompt " TMUX #[default]#[fg=$color_purple]$mode_separator"
set -g @mode_indicator_empty_mode_style fg=$color_bg,bg=$color_purple,bold
set -g @mode_indicator_prefix_prompt " TMUX #[default]#[fg=$color_blue]$mode_separator"
set -g @mode_indicator_prefix_mode_style fg=$color_bg,bg=$color_blue,bold
set -g @mode_indicator_copy_prompt " COPY #[default]#[fg=$color_green]$mode_separator"
set -g @mode_indicator_copy_mode_style fg=$color_bg,bg=$color_green,bold
set -g @mode_indicator_sync_prompt " SYNC #[default]#[fg=$color_red]$mode_separator"
set -g @mode_indicator_sync_mode_style fg=$color_bg,bg=$color_red,bold

# tmux cpu
set -g @cpu_percentage_format "%3.0f%%"

# tmux-online-status
set -g @route_to_ping "vultr.net"
set -g @online_icon "#[fg=$color_gray]¾░¢®"
set -g @offline_icon "#[fg=$color_red]¾░¢¬"

# tmux-pomodoro
set -g @pomodoro_on "  #[fg=$color_red]ŅĆü "
set -g @pomodoro_complete "  #[fg=$color_green]ŅĆü "
set -g @pomodoro_pause "  #[fg=$color_yellow]ŅĆü "
set -g @pomodoro_prompt_break "  #[fg=$color_green]ŅĆü ?"
set -g @pomodoro_prompt_pomodoro "  #[fg=$color_red]ŅĆü ?"
set -g @pomodoro_interval_display "#[fg=$color_gray]|#[fg=italics]%s"

# tmux-battery
set -g @batt_icon_charge_tier8 "’ēĆ"
set -g @batt_icon_charge_tier7 "’ēĆ"
set -g @batt_icon_charge_tier6 "’ēü"
set -g @batt_icon_charge_tier5 "’ēü"
set -g @batt_icon_charge_tier4 "’ēé"
set -g @batt_icon_charge_tier3 "’ēé"
set -g @batt_icon_charge_tier2 "’ēā"
set -g @batt_icon_charge_tier1 "’ēā"

set -g @batt_icon_status_charged " "
set -g @batt_icon_status_charging " ’ā¦ "
set -g @batt_icon_status_discharging " "
set -g @batt_icon_status_attached " "
set -g @batt_icon_status_unknown " "

set -g @batt_remain_short true

#################################### OPTIONS ###################################

set -g status on
set -g status-justify centre
set -g status-position top
set -g status-left-length 90
set -g status-right-length 90
set -g status-style "bg=$color_fg"

set -g pane-active-border fg=$color_gray
set -g pane-border-style fg=$color_gray

set -g message-style bg=$color_blue,fg=$color_bg
setw -g window-status-separator "   "
set-window-option -g mode-style bg=$color_purple,fg=$color_bg

#################################### FORMAT ####################################

set -g status-left "#{tmux_mode_indicator} #[fg=$color_gray]%R#{pomodoro_status}"
set -g status-right "#[fg=$color_gray]#{battery_icon_charge}  #{battery_percentage}#{battery_icon_status}  ’Æ╝ #{cpu_percentage}  #{online_status} "
setw -g window-status-format "#[fg=$color_gray,italics]#I: #[noitalics]#W#{?#{||:#{window_bell_flag},#{window_zoomed_flag}}, ,}#{?window_bell_flag,Ņ¬ó,}#{?window_zoomed_flag,’Ćé,}"
setw -g window-status-current-format "#[fg=$color_purple,italics]#I: #[fg=$color_buffer,noitalics,bold]#W#{?#{||:#{window_bell_flag},#{window_zoomed_flag}}, ,}#{?window_bell_flag,Ņ¬ó,}#{?window_zoomed_flag,’Ćé,}"
